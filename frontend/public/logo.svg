<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e3a5f"/>

  <!-- Clipboard body -->
  <rect x="136" y="120" width="240" height="300" rx="20" fill="#ffffff" opacity="0.95"/>

  <!-- Clipboard clip at top -->
  <rect x="206" y="100" width="100" height="40" rx="12" fill="#2563eb"/>

  <!-- Task lines -->
  <!-- Line 1: checked -->
  <circle cx="178" cy="210" r="14" fill="none" stroke="#2563eb" stroke-width="8"/>
  <polyline points="170,210 176,218 190,202" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="205" y="204" width="110" height="12" rx="6" fill="#94a3b8"/>

  <!-- Line 2: checked -->
  <circle cx="178" cy="258" r="14" fill="none" stroke="#2563eb" stroke-width="8"/>
  <polyline points="170,258 176,266 190,250" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="205" y="252" width="90" height="12" rx="6" fill="#94a3b8"/>

  <!-- Line 3: in progress (half circle) -->
  <circle cx="178" cy="306" r="14" fill="none" stroke="#f59e0b" stroke-width="8"/>
  <rect x="205" y="300" width="120" height="12" rx="6" fill="#cbd5e1"/>

  <!-- Team dots at bottom -->
  <circle cx="196" cy="368" r="18" fill="#2563eb"/>
  <circle cx="236" cy="368" r="18" fill="#3b82f6"/>
  <circle cx="276" cy="368" r="18" fill="#60a5fa"/>
  <circle cx="316" cy="368" r="18" fill="#93c5fd"/>
</svg>
